services:

  weather-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${WEATHER_DB_NAME}
      POSTGRES_USER: ${WEATHER_DB_USER}
      POSTGRES_PASSWORD: ${WEATHER_DB_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - weather_database_data:/var/lib/postgresql/data
      - ./sql/initialise_weather_database.sql:/docker-entrypoint-initdb.d/01-initialise.sql:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${WEATHER_DB_USER} -d ${WEATHER_DB_NAME}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped


  airflow-dag-processor:
    environment:
      PYTHONPATH: /opt/airflow
      WEATHER_DB_HOST: ${WEATHER_DB_HOST}
      WEATHER_DB_PORT: ${WEATHER_DB_PORT}
      WEATHER_DB_NAME: ${WEATHER_DB_NAME}
      WEATHER_DB_USER: ${WEATHER_DB_USER}
      WEATHER_DB_PASSWORD: ${WEATHER_DB_PASSWORD}

    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data

    depends_on:
      weather-postgres:
        condition: service_healthy


  airflow-scheduler:
    environment:
      PYTHONPATH: /opt/airflow
      WEATHER_DB_HOST: ${WEATHER_DB_HOST}
      WEATHER_DB_PORT: ${WEATHER_DB_PORT}
      WEATHER_DB_NAME: ${WEATHER_DB_NAME}
      WEATHER_DB_USER: ${WEATHER_DB_USER}
      WEATHER_DB_PASSWORD: ${WEATHER_DB_PASSWORD}

    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data

    depends_on:
      weather-postgres:
        condition: service_healthy


  airflow-worker:
    environment:
      PYTHONPATH: /opt/airflow
      WEATHER_DB_HOST: ${WEATHER_DB_HOST}
      WEATHER_DB_PORT: ${WEATHER_DB_PORT}
      WEATHER_DB_NAME: ${WEATHER_DB_NAME}
      WEATHER_DB_USER: ${WEATHER_DB_USER}
      WEATHER_DB_PASSWORD: ${WEATHER_DB_PASSWORD}

    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data

    depends_on:
      weather-postgres:
        condition: service_healthy


volumes:
  weather_database_data: